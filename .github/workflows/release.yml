name: Release
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. 1.0.2)"
        required: true
      release_notes:
        description: "Release notes (ถ้าเว้นว่างจะ auto-generate จาก git log)"
        required: false
        default: ""

jobs:
  build:
    name: "Build & Release"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: "Checkout sources"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Update version in build.gradle"
        env:
          VERSION_INPUT: "${{ github.event.inputs.version }}"
        run: |
          sed -i "s/ext\.appVersionName = '[^']*'/ext.appVersionName = '$VERSION_INPUT'/" build.gradle

      - name: "Read version from build.gradle"
        id: version
        run: |
          VERSION=$(grep -oP "(?<=ext\.appVersionName = ')[^']+" build.gradle)
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: "Commit and push version bump"
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s/| Version | [^|]* |/| Version | ${{ steps.version.outputs.name }} |/" README.md
          git add build.gradle README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: bump version to ${{ steps.version.outputs.name }} [skip ci]"
            git push origin HEAD
          fi

      - name: "Generate changelog"
        id: changelog
        env:
          RELEASE_NOTES: "${{ github.event.inputs.release_notes }}"
        run: |
          NOTES="$RELEASE_NOTES"
          if [ -z "$NOTES" ]; then
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              NOTES=$(git log "$LAST_TAG"..HEAD --pretty=format:"- %s" --no-merges)
            else
              NOTES=$(git log --pretty=format:"- %s" --no-merges -20)
            fi
            if [ -z "$NOTES" ]; then
              NOTES="Bug fixes and improvements."
            fi
          fi
          DELIM=$(openssl rand -hex 16)
          {
            echo "notes<<$DELIM"
            printf '%s\n' "$NOTES"
            echo "$DELIM"
          } >> $GITHUB_OUTPUT

      - name: "Setup Java"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@v4
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"

      - name: "Setup matchers"
        run: |
          matchers_dir='${{ github.workspace }}/.github/matchers'
          matcher_list()
          {
            echo 'gradle-build-matcher.json'
            echo 'gradle-build-kotlin-error-matcher.json'
          }
          matcher_list | while IFS='' read -r NAME; do
            if test -f "${matchers_dir:?}/${NAME:?}"; then
              echo "::add-matcher::${matchers_dir:?}/${NAME:?}"
              echo "Matcher configured: ${NAME:?}"
            fi
          done

      - name: "Execute Gradle build"
        run: "./gradlew --no-daemon clean :play-services-core:assembleDefaultRelease"

      - name: "Sign app APK"
        uses: ilharp/sign-android-release@v2
        id: sign_app
        with:
          releaseDir: play-services-core/build/outputs/apk/default/release
          signingKey: ${{ secrets.KEYSTORE_B64 }}
          keyAlias: ${{ secrets.KEYSTORE_ENTRY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEYSTORE_ENTRY_PASSWORD }}
          buildToolsVersion: 37.0.0

      - name: "Rename APK"
        run: |
          mv "${{ steps.sign_app.outputs.signedFile }}" "bear-microg-v${{ steps.version.outputs.name }}.apk"

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: "v${{ steps.version.outputs.name }}"
          name: "Bear MicroG v${{ steps.version.outputs.name }}"
          body: |
            ## 🐻 Bear MicroG v${{ steps.version.outputs.name }}

            ${{ steps.changelog.outputs.notes }}

            ---

            ### 📥 วิธีติดตั้ง
            1. ดาวน์โหลดไฟล์ `bear-microg-v${{ steps.version.outputs.name }}.apk` ด้านล่าง
            2. เปิดไฟล์และกด **ติดตั้ง**
            3. หากติดตั้งทับเวอร์ชันเดิม ให้กด **อัพเดท**

            ---

            🌐 **Website:** https://bearappth.github.io
            💻 **GitHub:** https://github.com/BearAppTH/MicroG-RE
          files: bear-microg-v${{ steps.version.outputs.name }}.apk
          draft: false
          prerelease: false
