name: Release
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. 1.0.1)"
        required: true
        default: "1.0.1"
      release_notes:
        description: "Release notes"
        required: false
        default: "Bug fixes and improvements."

jobs:
  build:
    name: "Build & Release"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout sources"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: "Setup Java"
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GradleEncryptionKey }}
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"

      - name: "Setup matchers"
        run: |
          matchers_dir='${{ github.workspace }}/.github/matchers'
          matcher_list()
          {
            echo 'gradle-build-matcher.json'
            echo 'gradle-build-kotlin-error-matcher.json'
          }
          matcher_list | while IFS='' read -r NAME; do
            if test -f "${matchers_dir:?}/${NAME:?}"; then
              echo "::add-matcher::${matchers_dir:?}/${NAME:?}"
              echo "Matcher configured: ${NAME:?}"
            fi
          done

      - name: "Execute Gradle build"
        run: "./gradlew --no-daemon clean :play-services-core:assembleDefaultRelease"

      - name: "Sign app APK"
        uses: ilharp/sign-android-release@v2
        id: sign_app
        with:
          releaseDir: play-services-core/build/outputs/apk/default/release
          signingKey: ${{ secrets.KEYSTORE_B64 }}
          keyAlias: ${{ secrets.KEYSTORE_ENTRY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEYSTORE_ENTRY_PASSWORD }}
          buildToolsVersion: 36.0.0

      - name: "Rename APK"
        run: |
          mv ${{ steps.sign_app.outputs.signedFile }} bear-microg-v${{ github.event.inputs.version }}.apk

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "Bear MicroG v${{ github.event.inputs.version }}"
          body: |
            ## 🐻 Bear MicroG v${{ github.event.inputs.version }}

            ${{ github.event.inputs.release_notes }}

            ---

            ### 📥 วิธีติดตั้ง
            1. ดาวน์โหลดไฟล์ `bear-microg-v${{ github.event.inputs.version }}.apk` ด้านล่าง
            2. เปิดไฟล์และกด **ติดตั้ง**
            3. หากติดตั้งทับเวอร์ชันเดิม ให้กด **อัพเดท**

            ---

            🌐 **Website:** https://www.bearappth.online
            💻 **GitHub:** https://github.com/BearAppTH/MicroG-RE
          files: bear-microg-v${{ github.event.inputs.version }}.apk
          draft: false
          prerelease: false
