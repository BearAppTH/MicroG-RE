name: Back Merge Main to Dev

on:
  push:
    branches:
      - main

concurrency:
  group: back-merge
  cancel-in-progress: false

jobs:
  back-merge:
    name: Back Merge Main to Dev
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge main into dev
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin dev main

          # Check if dev is already up-to-date with main
          AHEAD=$(git rev-list --count origin/dev..origin/main)
          if [ "$AHEAD" -eq 0 ]; then
            echo "dev is already up-to-date with main. Nothing to merge."
            exit 0
          fi

          git checkout dev

          # Attempt merge; if conflicts arise, abort cleanly instead of failing CI
          if git merge origin/main -m "chore: merge main back into dev [skip ci]"; then
            git push origin dev
            echo "✅ Merged $AHEAD commit(s) from main into dev."
          else
            git merge --abort
            echo "⚠️ Merge conflicts detected between main and dev."
            echo "Please resolve conflicts manually and merge main → dev."
            exit 0
          fi
