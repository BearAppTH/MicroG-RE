name: Crowdin pull and merge

on:
  schedule:
    - cron: "0 */12 * * *" # every 12 hours
  workflow_dispatch:

jobs:
  pull:
    name: Pull translations from Crowdin
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          clean: true

      - name: Pull strings from Crowdin
        uses: crowdin/github-action@v2
        with:
          config: crowdin.yml
          upload_sources: false
          download_translations: true
          skip_ref_checkout: true
          localization_branch_name: crowdin
          create_pull_request: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

  merge:
    name: Squash merge Crowdin into Dev
    if: github.event_name == 'workflow_dispatch'
    needs: pull
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          clean: true

      - name: Fetch and squash-merge crowdin into dev
        run: |
          git config --local user.name "Crowdin Bot"
          git config --local user.email "support+bot@crowdin.com"
          git fetch origin crowdin
          if ! git merge --squash origin/crowdin; then
            echo "::error::Merge conflicts between crowdin and dev. Manual resolution required."
            git merge --abort 2>/dev/null || true
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Compile Android app to verify merged translations
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean assembleDebug

      - name: Commit and push if translations changed
        run: |
          if ! git diff --staged --quiet; then
            git commit -m "chore: Update translations from Crowdin"
            git push origin dev
          else
            echo "No translation changes to commit."
          fi
