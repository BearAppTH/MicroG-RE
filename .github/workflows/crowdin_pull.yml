name: Crowdin pull and merge

on:
  schedule:
    - cron: "0 */12 * * *" # every 12 hours
  workflow_dispatch:

jobs:
  pull:
    name: Pull translations from Crowdin
    if: ${{ (github.event_name == 'schedule' || github.ref == 'refs/heads/dev') && secrets.CROWDIN_PROJECT_ID != '' && secrets.CROWDIN_PERSONAL_TOKEN != '' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          clean: true

      - name: Pull strings from Crowdin
        uses: crowdin/github-action@v2
        with:
          config: crowdin.yml
          upload_sources: false
          download_translations: true
          skip_ref_checkout: true
          localization_branch_name: crowdin
          create_pull_request: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

  merge:
    name: Squash merge Crowdin into Dev
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/dev' && needs.pull.result == 'success' }}
    needs: pull
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          clean: true

      - name: Fetch and squash-merge crowdin into dev
        id: merge
        run: |
          git config --local user.name "Crowdin Bot"
          git config --local user.email "support+bot@crowdin.com"

          # Skip if crowdin branch does not exist yet
          if ! git fetch origin crowdin 2>/dev/null; then
            echo "crowdin branch does not exist yet. Nothing to merge."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if ! git merge --squash origin/crowdin; then
            echo "⚠️ Merge conflicts between crowdin and dev. Manual resolution required."
            git reset --hard HEAD || true
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git diff --staged --quiet; then
            echo "No staged changes after squash merge. Already up to date."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Java
        if: steps.merge.outputs.has_changes == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Gradle
        if: steps.merge.outputs.has_changes == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Compile Android app to verify merged translations
        id: compile
        if: steps.merge.outputs.has_changes == 'true'
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean assembleDebug

      - name: Commit and push if translations changed
        if: steps.merge.outputs.has_changes == 'true' && steps.compile.outcome == 'success'
        run: |
          git commit -m "chore: Update translations from Crowdin"
          git push origin dev
