name: "Gradle build"
permissions:
  contents: read
on:
  - push
  - pull_request
  - workflow_dispatch

jobs:
  build:
    name: "Gradle build"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: "Checkout sources"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Setup Java"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@v4
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
      - name: "Setup matchers"
        run: |
          matchers_dir='${{ github.workspace }}/.github/matchers'
          matcher_list()
          {
            echo 'gradle-build-matcher.json'
            echo 'gradle-build-kotlin-error-matcher.json'
          }
          matcher_list | while IFS='' read -r NAME; do
            if test -f "${matchers_dir:?}/${NAME:?}"; then
              echo "::add-matcher::${matchers_dir:?}/${NAME:?}"
              echo "Matcher configured: ${NAME:?}"
            fi
          done
      - name: "Build debug APKs"
        run: "./gradlew --no-daemon assembleDebug"
      - name: "Run unit tests"
        run: "./gradlew --no-daemon test"
        continue-on-error: true
      - name: "Run lint"
        run: "./gradlew --no-daemon lint"
        continue-on-error: ${{ github.event_name != 'pull_request' }}
      - name: "Upload APK artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: play-services-core/build/outputs/apk/
          retention-days: 7
      - name: "Upload lint reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: "**/build/reports/lint-results-*.html"
          if-no-files-found: ignore
          retention-days: 7
