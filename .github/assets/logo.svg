<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a2f5e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="bearGrad" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7ab3ff"/>
      <stop offset="100%" stop-color="#4f8ef7"/>
    </radialGradient>
    <radialGradient id="innerEar" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3060b8"/>
      <stop offset="100%" stop-color="#1e3f80"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="80" cy="80" r="80" fill="url(#bgGrad)"/>
  <!-- Subtle ring -->
  <circle cx="80" cy="80" r="75" fill="none" stroke="#4f8ef7" stroke-width="1" opacity="0.25"/>

  <!-- Left ear outer -->
  <circle cx="48" cy="48" r="19" fill="url(#bearGrad)"/>
  <!-- Left ear inner -->
  <circle cx="48" cy="48" r="11" fill="url(#innerEar)"/>

  <!-- Right ear outer -->
  <circle cx="112" cy="48" r="19" fill="url(#bearGrad)"/>
  <!-- Right ear inner -->
  <circle cx="112" cy="48" r="11" fill="url(#innerEar)"/>

  <!-- Bear head -->
  <circle cx="80" cy="92" r="50" fill="url(#bearGrad)"/>

  <!-- Muzzle -->
  <ellipse cx="80" cy="109" rx="23" ry="17" fill="url(#innerEar)"/>

  <!-- Left eye -->
  <circle cx="65" cy="85" r="8.5" fill="#ffffff"/>
  <circle cx="66" cy="86" r="5" fill="#0d1117"/>
  <circle cx="67.5" cy="84.5" r="2" fill="#ffffff"/>

  <!-- Right eye -->
  <circle cx="95" cy="85" r="8.5" fill="#ffffff"/>
  <circle cx="96" cy="86" r="5" fill="#0d1117"/>
  <circle cx="97.5" cy="84.5" r="2" fill="#ffffff"/>

  <!-- Nose -->
  <ellipse cx="80" cy="101" rx="8" ry="6" fill="#0d1117"/>

  <!-- Mouth -->
  <path d="M74 109 Q80 115 86 109" stroke="#0d1117" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
